name: Atualizar e publicar Anúncios DR

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch: {}
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: Gerar dados (oficial + DR)
        run: python gerar_dados.py
      - name: Preparar pasta do site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp dados.json.gz _site/dados.json.gz
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
